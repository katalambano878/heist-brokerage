server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Traefik strips the /admin prefix, so the container receives root paths.
    # Vite base is /admin/ so the browser still requests assets under /admin/.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
}
